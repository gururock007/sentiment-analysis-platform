# deployment/overlays/dev/kustomization.yml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yml
  - namespace.yml

namespace: sentiment-dev

labels:
  - pairs:
      env: dev

configMapGenerator:
  - name: gateway-config
    literals:
      - ENV=dev

  - name: job-config
    literals:
      - ENV=dev
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - REDIS_SERVICE_PORT=6379
      - POSTGRES_DB=sentiment
  
  - name: worker-config
    literals:
      - ENV=dev
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - REDIS_SERVICE_PORT=6379
      - POSTGRES_DB=sentiment

secretGenerator:
  - name: job-secret
    literals:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app

  - name: worker-secret
    literals:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app


patches:
  - path: gateway-patch.yml
  - path: job-patch.yml
  - path: worker-patch.yml