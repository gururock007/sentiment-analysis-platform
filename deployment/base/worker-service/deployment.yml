# base/worker/depployment.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      enableServiceLinks: false
      containers:
        - name: sentiment-worker
          image: sentiment-worker:v1
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: worker-config
            - secretRef:
                name: worker-secret